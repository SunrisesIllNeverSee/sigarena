# Cron rebuild — rebuilds + redeploys the static site on a schedule.
#
# Since the site uses Static Generation (pages are pre-built at deploy time),
# the data snapshot is frozen until the next deploy. This workflow rebuilds
# the site twice a week (Thursday + Sunday at 00:00 UTC) to refresh the
# leaderboard data.
#
# The rebuild runs on GitHub Actions (not Cloudflare), so it doesn't consume
# Worker CPU. The deploy step pushes the new static assets to Cloudflare.
#
# Required GitHub secrets (same as deploy.yml):
#   CLOUDFLARE_API_TOKEN  — Workers edit token
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# Manual trigger: Actions tab → "Cron rebuild" → Run workflow

name: Cron rebuild

on:
  schedule:
    # Thursday + Sunday at 00:00 UTC
    - cron: "0 0 * * 4,0"
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  rebuild:
    name: Rebuild + deploy static site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
