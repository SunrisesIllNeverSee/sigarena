# CodeQL — GitHub's static analysis (SAST) for JavaScript/TypeScript.
# Surfaces code-level security issues (taint flows, injection, crypto misuse)
# as "Code scanning alerts" under the Security tab and as PR annotations.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday — catches new queries / regressions between releases.
    - cron: "23 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (js/ts)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3
